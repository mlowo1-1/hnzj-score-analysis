</div></section>

<div class="pagination"><button id="prev-page">上一页</button><span id="page-info">第 1 页</span><button id="next-page">下一页</button></div>
</section>

var filteredScores=[],currentPage=1,itemsPerPage=15,sortColumn="year",sortDirection="desc";

document.addEventListener("DOMContentLoaded",function(){loadData();bindEvents()});

function getRank(score,year,category){
    var ys=String(year);if(!rankMapping[ys])return null;
    var sc=category;
    if(year>=2025){if(category==="文科")sc="历史类";else if(category==="理科")sc="物理类";}
    var cd=rankMapping[ys][sc];if(!cd)return null;
    var closest=null,minDiff=999999;
    for(var i=0;i<cd.length;i++){var diff=Math.abs(cd[i].score-score);if(diff<minDiff){minDiff=diff;closest=cd[i].rank;}if(diff===0)return cd[i].rank;}
    return minDiff<=3?closest:null;
}

function loadData(){filteredScores=allScores.slice();initFilters();renderTable();}
function clearOpts(s){while(s.options.length>1)s.remove(1);}
function initFilters(){
    var yf=document.getElementById("year-filter");clearOpts(yf);var ys={};allScores.forEach(function(s){ys[s.year]=1;});
    Object.keys(ys).sort(function(a,b){return b-a;}).forEach(function(y){var o=document.createElement("option");o.value=y;o.textContent=y;yf.appendChild(o);});
    var mf=document.getElementById("major-filter");clearOpts(mf);var ms={};allScores.forEach(function(s){ms[s.major]=1;});
    Object.keys(ms).sort().forEach(function(m){var o=document.createElement("option");o.value=m;o.textContent=m;mf.appendChild(o);});
    var cf=document.getElementById("category-filter");clearOpts(cf);var cs={};allScores.forEach(function(s){cs[s.category]=1;});
    Object.keys(cs).sort().forEach(function(c){var o=document.createElement("option");o.value=c;o.textContent=c;cf.appendChild(o);});
}
function bindEvents(){
    document.getElementById("apply-filters").addEventListener("click",applyFilters);
    document.getElementById("reset-filters").addEventListener("click",resetFilters);
    document.getElementById("export-csv").addEventListener("click",exportCSV);
    document.getElementById("prev-page").addEventListener("click",function(){if(currentPage>1){currentPage--;renderTable();}});
    document.getElementById("next-page").addEventListener("click",function(){var tp=Math.ceil(filteredScores.length/itemsPerPage);if(currentPage<tp){currentPage++;renderTable();}});
    document.querySelectorAll("#scores-table th[data-sort]").forEach(function(th){th.addEventListener("click",function(){
        var col=th.dataset.sort;if(sortColumn===col)sortDirection=sortDirection==="asc"?"desc":"asc";else{sortColumn=col;sortDirection="asc";}
        sortData();renderTable();
    });});
}
function applyFilters(){
    var yv=document.getElementById("year-filter").value;
    var mv=document.getElementById("major-filter").value;
    var cv=document.getElementById("category-filter").value;
    var minS=parseInt(document.getElementById("min-score").value)||0;
    var maxS=parseInt(document.getElementById("max-score").value)||Infinity;
    filteredScores=allScores.filter(function(s){
        if(yv&&s.year!==parseInt(yv))return false;
        if(mv&&s.major!==mv)return false;
        if(cv&&s.category!==cv)return false;
        if(s.min_score<minS)return false;
        if(s.min_score>maxS)return false;
        return true;
    });currentPage=1;renderTable();
}
function resetFilters(){
    document.getElementById("year-filter").value="";
    document.getElementById("major-filter").value="";
    document.getElementById("category-filter").value="";
    document.getElementById("min-score").value="";
    document.getElementById("max-score").value="";
    filteredScores=allScores.slice();currentPage=1;renderTable();
}
function sortData(){filteredScores.sort(function(a,b){
    var va=a[sortColumn],vb=b[sortColumn];
    if(sortColumn==="rank"){va=getRank(a.min_score,a.year,a.category)||9999999;vb=getRank(b.min_score,b.year,b.category)||9999999;}
    if(typeof va==="string"){va=va.toLowerCase();vb=vb.toLowerCase();}
    if(va<vb)return sortDirection==="asc"?-1:1;if(va>vb)return sortDirection==="asc"?1:-1;return 0;
});}
function renderTable(){
    var tbody=document.getElementById("scores-tbody");tbody.innerHTML="";
    document.querySelectorAll("#scores-table th[data-sort]").forEach(function(th){var ind=th.querySelector(".sort-indicator");if(ind)ind.remove();});
    var ath=document.querySelector('th[data-sort="'+sortColumn+'"]');
    if(ath){var sp=document.createElement("span");sp.className="sort-indicator";sp.textContent=sortDirection==="asc"?" ↑":" ↓";ath.appendChild(sp);}
    var start=(currentPage-1)*itemsPerPage,pageData=filteredScores.slice(start,start+itemsPerPage);
    pageData.forEach(function(s){
        var row=document.createElement("tr");
        var t1=document.createElement("td");t1.textContent=s.year;row.appendChild(t1);
        var t2=document.createElement("td");t2.textContent=s.major;row.appendChild(t2);
        var t3=document.createElement("td");t3.textContent=s.category;row.appendChild(t3);
        var t4=document.createElement("td");t4.className="score-cell";t4.textContent=s.min_score;row.appendChild(t4);
        var t5=document.createElement("td");t5.className="rank-cell";
        var rank=getRank(s.min_score,s.year,s.category);t5.textContent=rank?rank.toLocaleString():"-";row.appendChild(t5);
        tbody.appendChild(row);
    });
    if(pageData.length===0){var row=document.createElement("tr");row.innerHTML='<td colspan="5" style="text-align:center;padding:40px;color:#999">没有匹配的数据</td>';tbody.appendChild(row);}
    var tp=Math.max(1,Math.ceil(filteredScores.length/itemsPerPage));
    document.getElementById("page-info").textContent="第 "+currentPage+" 页 / 共 "+tp+" 页";
    document.getElementById("prev-page").disabled=currentPage<=1;
    document.getElementById("next-page").disabled=currentPage>=tp||filteredScores.length===0;
    var rc=document.getElementById("results-count");
    rc.textContent=filteredScores.length!==allScores.length?"筛选结果："+filteredScores.length+" / "+allScores.length+" 条":"共 "+allScores.length+" 条数据";
}
function esc(f){var s=String(f);if(s.includes(",")||s.includes('"')||s.includes("\n"))return '"'+s.replace(/"/g,'""')+'"';return s;}
function exportCSV(){
    var h=["年份","专业","科类","最低分","位次"],c=h.map(esc).join(",")+"\n";
    filteredScores.forEach(function(s){var r=getRank(s.min_score,s.year,s.category);
    c+=[s.year,s.major,s.category,s.min_score,r||""].map(esc).join(",")+"\n";});
    var b=new Blob(["\ufeff"+c],{type:"text/csv;charset=utf-8;"}),l=document.createElement("a");
    l.href=URL.createObjectURL(b);l.download="河南职业技术学院分数线数据.csv";l.click();
    setTimeout(function(){URL.revokeObjectURL(l.href);},100);
}
