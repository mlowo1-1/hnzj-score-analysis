.filter-group select,

.filter-group select:focus,

.btn-group {

button:active {

#apply-filters {

#reset-filters {

#export-csv {

#scores-table th,

    });

    const majorFilter = document.getElementById('major-filter');
    clearFilterOptions(majorFilter);
    const majors = [...new Set(allScores.map(score => score.major))].sort();
    majors.forEach(major => {
        const option = document.createElement('option');
        option.value = major;
        option.textContent = major;
        majorFilter.appendChild(option);
    });

    const categoryFilter = document.getElementById('category-filter');
    clearFilterOptions(categoryFilter);
    const categories = [...new Set(allScores.map(score => score.category))].sort();
    categories.forEach(category => {
        const option = document.createElement('option');
        option.value = category;
        option.textContent = category;
        categoryFilter.appendChild(option);
    });
}

function bindEvents() {
    document.getElementById('apply-filters').addEventListener('click', applyFilters);
    document.getElementById('reset-filters').addEventListener('click', resetFilters);
    document.getElementById('export-csv').addEventListener('click', exportCSV);

    document.getElementById('prev-page').addEventListener('click', () => {
        if (currentPage > 1) {
            currentPage--;
            renderTable();
        }
    });

    document.getElementById('next-page').addEventListener('click', () => {
        const totalPages = Math.ceil(filteredScores.length / itemsPerPage);
        if (currentPage < totalPages) {
            currentPage++;
            renderTable();
        }
    });

    document.querySelectorAll('#scores-table th[data-sort]').forEach(th => {
        th.addEventListener('click', () => {
            const column = th.dataset.sort;
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }
            sortData();
            renderTable();
        });
    });
}

function applyFilters() {
    const yearFilter = document.getElementById('year-filter').value;
    const majorFilter = document.getElementById('major-filter').value;
    const categoryFilter = document.getElementById('category-filter').value;
    const minScore = parseInt(document.getElementById('min-score').value) || 0;
    const maxScore = parseInt(document.getElementById('max-score').value) || Infinity;

    filteredScores = allScores.filter(score => {
        if (yearFilter && score.year !== parseInt(yearFilter)) return false;
        if (majorFilter && score.major !== majorFilter) return false;
        if (categoryFilter && score.category !== categoryFilter) return false;
        if (score.min_score < minScore) return false;
        if (score.min_score > maxScore) return false;
        return true;
    });

    currentPage = 1;
    renderTable();
}

function resetFilters() {
    document.getElementById('year-filter').value = '';
    document.getElementById('major-filter').value = '';
    document.getElementById('category-filter').value = '';
    document.getElementById('min-score').value = '';
    document.getElementById('max-score').value = '';

    filteredScores = [...allScores];
    currentPage = 1;
    renderTable();
}

function sortData() {
    filteredScores.sort((a, b) => {
        let valueA = a[sortColumn];
        let valueB = b[sortColumn];

        if (typeof valueA === 'string') {
            valueA = valueA.toLowerCase();
            valueB = valueB.toLowerCase();
        }

        if (valueA < valueB) return sortDirection === 'asc' ? -1 : 1;
        if (valueA > valueB) return sortDirection === 'asc' ? 1 : -1;
        return 0;
    });
}

function createCell(text) {
    const td = document.createElement('td');
    td.textContent = text;
    return td;
}

function renderTable() {
    const tbody = document.getElementById('scores-tbody');
    tbody.innerHTML = '';

    document.querySelectorAll('#scores-table th[data-sort]').forEach(th => {
        const indicator = th.querySelector('.sort-indicator');
        if (indicator) indicator.remove();
    });
    const activeTh = document.querySelector(`th[data-sort="${sortColumn}"]`);
    if (activeTh) {
        const span = document.createElement('span');
        span.className = 'sort-indicator';
        span.textContent = sortDirection === 'asc' ? ' ↑' : ' ↓';
        activeTh.appendChild(span);
    }

    const startIndex = (currentPage - 1) * itemsPerPage;
    const endIndex = startIndex + itemsPerPage;
    const pageData = filteredScores.slice(startIndex, endIndex);

    pageData.forEach(score => {
        const row = document.createElement('tr');
        row.appendChild(createCell(score.year));
        row.appendChild(createCell(score.major));
        row.appendChild(createCell(score.category));
        row.appendChild(createCell(score.min_score));
        tbody.appendChild(row);
    });

    if (pageData.length === 0) {
        const row = document.createElement('tr');
        row.innerHTML = '<td colspan="4" style="text-align: center; padding: 40px; color: #999;">没有匹配的数据</td>';
        tbody.appendChild(row);
    }

    const totalPages = Math.max(1, Math.ceil(filteredScores.length / itemsPerPage));
    document.getElementById('page-info').textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页`;
    document.getElementById('prev-page').disabled = currentPage <= 1;
    document.getElementById('next-page').disabled = currentPage >= totalPages || filteredScores.length === 0;

    const resultsCount = document.getElementById('results-count');
    if (filteredScores.length !== allScores.length) {
        resultsCount.textContent = `筛选结果：${filteredScores.length} / ${allScores.length} 条`;
    } else {
        resultsCount.textContent = `共 ${allScores.length} 条数据`;
    }
}

function escapeCSVField(field) {
    const str = String(field);
    if (str.includes(',') || str.includes('"') || str.includes('\n')) {
        return '"' + str.replace(/"/g, '""') + '"';
    }
    return str;
}

function exportCSV() {
    const headers = ['年份', '专业', '科类', '最低分'];
    const csvContent = [
        headers.map(escapeCSVField).join(','),
        ...filteredScores.map(score => [
            score.year,
            score.major,
            score.category,
            score.min_score
        ].map(escapeCSVField).join(','))
    ].join('\n');

    const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = '河南职业技术学院分数线数据.csv';
    link.click();
    setTimeout(() => URL.revokeObjectURL(link.href), 100);
}

    </script>
